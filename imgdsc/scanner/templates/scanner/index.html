<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Scanner & Enhancer</title>
    <link rel="stylesheet" href="/static/scanner/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Document <span class="accent">Scanner</span></h1>
            <p>Enhance low-quality documents into clear digital scans instantly.</p>
        </header>

        <main>
            <div class="upload-section" id="drop-zone">
                <input type="file" id="file-input" hidden accept="image/*">
                <div class="upload-box">
                    <div class="icon">📄</div>
                    <h3>Drag & Drop or Click to Upload</h3>
                    <p>Supports JPG, PNG, WEBP (Max 10MB)</p>
                    <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Select Document</button>
                </div>
            </div>

            <div class="processing-section" id="processing" style="display: none;">
                <div class="scanner-animation">
                    <div class="scan-line"></div>
                </div>
                <h3>AI is enhancing your document...</h3>
                <p>Detecting edges & correcting perspective</p>
            </div>

            <div class="result-section" id="result" style="display: none;">
                <div class="comparison-container">
                    <div class="image-card">
                        <h4>Original</h4>
                        <img id="original-preview" src="" alt="Original">
                    </div>
                    <div class="image-card">
                        <h4>Enhanced</h4>
                        <img id="processed-preview" src="" alt="Processed">
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="resetUI()">Upload Another</button>
                    <a id="download-btn" href="#" download class="btn btn-primary">Download Scan</a>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/scanner/script.js"></script>
</body>
</html>
